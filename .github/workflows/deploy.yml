name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-blog

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 blog devops_project manage.py

      - name: Run migrations and tests
        run: |
          python manage.py migrate --noinput
          pytest -v --tb=short

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and tag Docker image
        run: |
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Deploy to Azure VM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "docker pull $IMAGE_NAME:latest && \
             docker stop devops-blog 2>/dev/null; docker rm devops-blog 2>/dev/null; \
             docker run -d --restart unless-stopped -p 80:8000 \
               -e DJANGO_ALLOWED_HOSTS=${{ secrets.SSH_HOST }},localhost,127.0.0.1 \
               --name devops-blog $IMAGE_NAME:latest"
