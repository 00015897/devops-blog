name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-blog

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 blog devops_project manage.py

      - name: Run migrations and tests
        run: |
          python manage.py migrate --noinput
          pytest -v --tb=short

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and tag Docker image
        run: |
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Create production .env
        run: |
          echo "IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/devops-blog:latest" > .env.prod
          echo "POSTGRES_DB=devops_db" >> .env.prod
          echo "POSTGRES_USER=devops_user" >> .env.prod
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env.prod
          echo "POSTGRES_HOST=db" >> .env.prod
          echo "POSTGRES_PORT=5432" >> .env.prod
          echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> .env.prod
          echo "DJANGO_DEBUG=0" >> .env.prod
          echo "DJANGO_ALLOWED_HOSTS=${{ secrets.SSH_HOST }},localhost,127.0.0.1" >> .env.prod

      - name: "Deploy to server (Compose: web + PostgreSQL + Nginx)"
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
          TARGET="${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}"
          DEPLOY_DIR="devops-blog"
          ssh $SSH_OPTS $TARGET "docker stop devops-blog 2>/dev/null; docker rm devops-blog 2>/dev/null; true; mkdir -p $DEPLOY_DIR $DEPLOY_DIR/nginx"
          scp $SSH_OPTS .env.prod $TARGET:$DEPLOY_DIR/.env
          scp $SSH_OPTS docker-compose.prod.yml $TARGET:$DEPLOY_DIR/
          scp $SSH_OPTS nginx/default.conf $TARGET:$DEPLOY_DIR/nginx/
          ssh $SSH_OPTS $TARGET "cd $DEPLOY_DIR && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d --remove-orphans"
