{% extends "base.html" %}
{% block title %}Register - Coffee Blog{% endblock %}
{% block content %}
<div class="content-center">
<h1 class="page-title"><i class="fas fa-user-plus"></i> Register</h1>
<div class="form-card">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                {{ field.label_tag }}
                {{ field }}
                {% if field.help_text %}<p class="helptext">{{ field.help_text }}</p>{% endif %}
                {{ field.errors }}
            </div>
        {% endfor %}
        <div class="form-actions">
            <button type="submit" class="btn btn--primary"><i class="fas fa-user-plus"></i> Register</button>
        </div>
    </form>
</div>
</div>
{% endblock %}
